name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Repo self-checks
        run: bash tests/run-checks.sh

  changelog-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Shipped-file changes carry a changelog entry
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash tests/changelog-gate.sh "origin/${BASE_REF}"

  tag-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches the manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(jq -r .version .claude-plugin/plugin.json)
          [ "$tag" = "$version" ] \
            || { echo "::error::tag v$tag does not match manifest version $version"; exit 1; }
          echo "tag v$tag matches the manifest"
