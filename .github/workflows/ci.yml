name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo self-checks
        run: bash tests/run-checks.sh

  changelog-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Shipped-file changes carry a changelog entry
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          base="origin/${BASE_REF}"
          changed=$(git diff --name-only "$base"...HEAD)
          printf 'changed files:\n%s\n' "$changed"
          if echo "$changed" | grep -qE '^(skills/|agents/|references/|\.claude-plugin/)'; then
            echo "$changed" | grep -q '^CHANGELOG\.md$' \
              || { echo "::error::shipped files changed without a CHANGELOG entry in this PR"; exit 1; }
          fi
          echo "gate satisfied"

  tag-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches the manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(jq -r .version .claude-plugin/plugin.json)
          [ "$tag" = "$version" ] \
            || { echo "::error::tag v$tag does not match manifest version $version"; exit 1; }
          echo "tag v$tag matches the manifest"
